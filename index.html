<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💖</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a0011, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* تأثير الكلام العائم الثري دي */
        .text-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }
        .scrolling-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ff66b2;
            text-shadow: 0 0 10px #ff007f, 0 0 30px #ff007f, 0 0 50px #ff007f;
            animation: float3D 6s ease-in-out infinite alternate;
            text-align: center;
        }
        @keyframes float3D {
            0% { transform: rotateY(-20deg) rotateX(10deg) translateZ(0px); }
            100% { transform: rotateY(20deg) rotateX(-10deg) translateZ(100px); }
        }
        /* تساقط القلوب */
        .heart {
            position: absolute;
            color: #ff3366;
            font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) scale(0); opacity: 1; }
            100% { transform: translateY(110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <div class="scrolling-text">I LOVE YOUUU hanonaaa 💖</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
