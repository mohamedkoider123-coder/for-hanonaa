<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حنونه متزعليش من محمد عبيط دا هو كان عقلو مهو هو بيقولك انو بيحبك واخر حاجه مريم دي عبيطه اسف</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a0011, #000000);
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1000px;
        }
        
        /* شاشة قفل الباسوورد */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 102, 178, 0.2);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.2);
        }

        .lock-card h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.3rem;
            text-shadow: 0 0 8px #ff007f;
        }

        .lock-card input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #ff66b2;
            padding: 10px 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 150px;
            margin-bottom: 15px;
        }

        .lock-card button {
            background: #ff007f;
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #ff007f;
        }

        .error-msg {
            color: #ff3333;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        /* كارد الأسماء والعداد */
        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 102, 178, 0.25);
            padding: 30px 45px;
            border-radius: 25px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.25);
            z-index: 999;
            min-width: 300px;
        }

        .title-text {
            color: #ff66b2;
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
            font-weight: bold;
        }

        .names-text {
            font-size: 2.8rem;
            color: #fff;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #ff007f;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .heart-icon {
            color: #ff007f;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ستايل العداد التصاعدي */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            direction: ltr;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .time-box { color: #fff; font-size: 0.9rem; }
        .time-num { font-size: 1.6rem; font-weight: bold; color: #ff66b2; text-shadow: 0 0 8px #ff007f; display: block; }
        .time-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }

        /* الكلمات العائمة */
        .floating-text {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 102, 178, 0.6);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            white-space: nowrap;
            transform-style: preserve-3d;
            animation: move3D 9s linear infinite;
            pointer-events: none;
        }

        @keyframes move3D {
            0% { transform: translate3d(var(--x-start), var(--y-start), -1000px) rotateY(var(--rot-start)); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate3d(var(--x-end), var(--y-end), 200px) rotateY(var(--rot-end)); opacity: 0; }
        }

        .star { position: absolute; background-color: #fff; border-radius: 50%; animation: twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .heart-fall { position: absolute; color: #ff3366; animation: fall linear infinite; z-index: 2; pointer-events: none; }
        @keyframes fall {
            0% { transform: translateY(-10vh) scale(0); opacity: 1; }
            100% { transform: translateY(110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <h2>🔒 ادخلي الرقم السري لرؤية المفاجأة</h2>
            <input type="password" id="pass-input" placeholder="••••">
            <br>
            <button onclick="checkPassword()">فتح المفاجأة 💖</button>
            <div id="error-msg" class="error-msg">الرقم السري غير صحيح، حاولي تاني! 🤔</div>
        </div>
    </div>

    <div class="info-card">
        <div class="names-text">
            mohamed <span class="heart-icon">❤️</span> hanen
        </div>
        <div class="title-text">الوقت الذي مر على حبنا 💖</div>
        <div class="countdown" id="countdown">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://bayanbox.ir/download/5549210086395982794/Sherine-Habat-Gannah.mp3" type="audio/mpeg">
    </audio>

    <script>
        const message = "I LOVE YOUUU hanonaa";
        const correctPassword = "12/9/2008"; 

        function checkPassword() {
            const input = document.getElementById("pass-input").value;
            const error = document.getElementById("error-msg");
            const lockScreen = document.getElementById("lock-screen");
            const audio = document.getElementById('bg-music');

            if (input === correctPassword) {
                lockScreen.style.opacity = "0";
                setTimeout(() => { lockScreen.style.display = "none"; }, 800);
                audio.play().catch(e => console.log("Audio playing..."));
                startAnimations();
            } else {
                error.style.display = "block";
                document.getElementById("pass-input").value = "";
            }
        }

        // 📅 الحساب التصاعدي من يوم 18 مايو 2026
        const startDate = new Date("May 18, 2026 00:00:00").getTime();
        
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - startDate; // الوقت الحالي ناقص وقت البداية = الوقت اللي مر
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }, 1000);

        function createFloatingText() {
            const textEl = document.createElement('div');
            textEl.classList.add('floating-text');
            textEl.innerText = message;
            textEl.style.fontSize = (Math.random() * 1.3 + 1.2) + 'rem';
            textEl.style.setProperty('--x-start', (Math.random() * 120 - 10) + 'vw');
            textEl.style.setProperty('--y-start', (Math.random() * 120 - 10) + 'vh');
            textEl.style.setProperty('--x-end', (Math.random() * 120 - 10) + 'vw');
            textEl.style.setProperty('--y-end', (Math.random() * 120 - 10) + 'vh');
            textEl.style.setProperty('--rot-start', (Math.random() * 40 - 20) + 'deg');
            textEl.style.setProperty('--rot-end', (Math.random() * 40 - 20) + 'deg');
            textEl.style.animationDuration = (Math.random() * 5 + 6) + 's';
            document.body.appendChild(textEl);
            setTimeout(() => { textEl.remove(); }, 11000);
        }

        function createStars() {
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 3 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(star);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 18 + 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function startAnimations() {
            createStars();
            setInterval(createFloatingText, 500);
            setInterval(createHeart, 300);
        }
    </script>
</body>
</html>
