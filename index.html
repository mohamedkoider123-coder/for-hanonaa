<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For hanonaa 💖</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a0011, #000000);
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1000px;
        }
        
        /* كارد التفاصيل والتعداد الرقمي */
        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 102, 178, 0.25);
            padding: 25px 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.2);
            z-index: 999;
            min-width: 280px;
        }

        .title-text {
            color: #ff66b2;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
        }

        .date-text {
            font-size: 2.2rem;
            color: #fff;
            letter-spacing: 2px;
            margin: 0 0 15px 0;
            text-shadow: 0 0 10px #ff007f;
            font-weight: bold;
        }

        /* ستايل العداد التنازلي */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            direction: ltr;
        }

        .time-box {
            color: #fff;
            font-size: 1rem;
        }

        .time-num {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff66b2;
            text-shadow: 0 0 8px #ff007f;
            display: block;
        }

        .time-label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
        }

        /* الكلمات العائمة ثلاثية الأبعاد */
        .floating-text {
            position: absolute;
            font-weight: bold;
            color: rgba(255, 102, 178, 0.65);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            white-space: nowrap;
            transform-style: preserve-3d;
            animation: move3D 9s linear infinite;
            pointer-events: none;
        }

        @keyframes move3D {
            0% {
                transform: translate3d(var(--x-start), var(--y-start), -1000px) rotateY(var(--rot-start));
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translate3d(var(--x-end), var(--y-end), 200px) rotateY(var(--rot-end));
                opacity: 0;
            }
        }

        /* النجوم المتلألئة في الخلفية */
        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* القلوب المتساقطة */
        .heart {
            position: absolute;
            color: #ff3366;
            animation: fall linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) scale(0); opacity: 1; }
            100% { transform: translateY(110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="info-card">
        <div class="title-text">SAVE THE DATE</div>
        <div class="date-text">18 . 05 . 2027</div>
        <div class="countdown" id="countdown">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        const message = "I LOVE YOUUU hanonaa";

        // تشغيل الموسيقى أول ما تلمس الشاشة
        document.body.addEventListener('click', () => {
            const audio = document.getElementById('bg-music');
            audio.play().catch(e => console.log("Audio playing..."));
        }, { once: true });

        // العداد التنازلي الجديد ليوم 18 مايو 2027
        const targetDate = new Date("May 18, 2027 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("mins").innerText = m < 10 ? "0" + m : m;
            document.getElementById("secs").innerText = s < 10 ? "0" + s : s;
        }, 1000);

        // توليد الكلمات العائمة
        function createFloatingText() {
            const textEl = document.createElement('div');
            textEl.classList.add('floating-text');
            textEl.innerText = message;
            
            textEl.style.fontSize = (Math.random() * 1.3 + 1.2) + 'rem';
            textEl.style.setProperty('--x-start', (Math.random() * 120 - 10) + 'vw');
            textEl.style.setProperty('--y-start', (Math.random() * 120 - 10) + 'vh');
            textEl.style.setProperty('--x-end', (Math.random() * 120 - 10) + 'vw');
            textEl.style.setProperty('--y-end', (Math.random() * 120 - 10) + 'vh');
            textEl.style.setProperty('--rot-start', (Math.random() * 40 - 20) + 'deg');
            textEl.style.setProperty('--rot-end', (Math.random() * 40 - 20) + 'deg');
            
            textEl.style.animationDuration = (Math.random() * 5 + 6) + 's';
            
            document.body.appendChild(textEl);
            setTimeout(() => { textEl.remove(); }, 11000);
        }

        // توليد النجوم
        function createStars() {
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(star);
            }
        }

        // توليد القلوب
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 18 + 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        createStars();
        setInterval(createFloatingText, 500);
        setInterval(createHeart, 300);
        for(let i=0; i<10; i++) { createFloatingText(); }
    </script>
</body>
</html>
